<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#14141f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="url(#accentGrad)" font-family="Inter, sans-serif" font-size="24" font-weight="700">Secondus Architecture</text>
  <text x="450" y="62" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="12">Real-Time Negotiation Intelligence Agent</text>

  <!-- Layer Labels -->
  <text x="30" y="140" fill="#6366f1" font-family="Inter, sans-serif" font-size="11" font-weight="600">BROWSER</text>
  <text x="30" y="300" fill="#22c55e" font-family="Inter, sans-serif" font-size="11" font-weight="600">CLOUD RUN</text>
  <text x="30" y="480" fill="#f59e0b" font-family="Inter, sans-serif" font-size="11" font-weight="600">VERTEX AI</text>

  <!-- Browser Layer -->
  <rect x="80" y="90" width="180" height="100" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="170" y="115" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">User Interface</text>
  <text x="170" y="140" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">index.html</text>
  <text x="170" y="160" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Session Setup</text>
  <text x="170" y="175" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Live Interventions Feed</text>

  <rect x="290" y="90" width="140" height="100" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="115" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">Audio Capture</text>
  <text x="360" y="140" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">getUserMedia</text>
  <text x="360" y="160" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">16kHz PCM</text>
  <text x="360" y="175" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Base64 chunks</text>

  <rect x="460" y="90" width="140" height="100" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="530" y="115" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">Screen Share</text>
  <text x="530" y="140" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">getDisplayMedia</text>
  <text x="530" y="160" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">JPEG frames</text>
  <text x="530" y="175" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">every 2 seconds</text>

  <!-- WebSocket Arrow -->
  <path d="M 400 195 L 400 235" stroke="url(#accentGrad)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 420 235 L 420 195" stroke="url(#accentGrad)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="450" y="218" fill="#6366f1" font-family="JetBrains Mono, monospace" font-size="9">WebSocket Bidi-Stream</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Cloud Run Layer -->
  <rect x="120" y="250" width="560" height="140" rx="12" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="680" y="265" fill="#22c55e" font-family="Inter, sans-serif" font-size="9">Google Cloud Run</text>

  <rect x="140" y="270" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="220" y="295" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">FastAPI Server</text>
  <text x="220" y="315" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">main.py</text>
  <text x="220" y="340" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">/session/create</text>
  <text x="220" y="355" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">/ws/negotiate/{id}</text>

  <rect x="330" y="270" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="295" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">ADK Runner</text>
  <text x="410" y="315" text-anchor="middle" fill="#22c55e" font-family="Inter, sans-serif" font-size="10" font-weight="600">run_live()</text>
  <text x="410" y="340" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">LiveRequestQueue</text>
  <text x="410" y="355" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">InMemorySessionService</text>

  <rect x="520" y="270" width="140" height="100" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="590" y="295" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="13" font-weight="600">Agent</text>
  <text x="590" y="315" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">agent.py</text>
  <text x="590" y="340" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Negotiation</text>
  <text x="590" y="355" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">System Prompt</text>

  <!-- Internal arrows -->
  <path d="M 300 320 L 325 320" stroke="#8888aa" stroke-width="1" fill="none" marker-end="url(#arrowSmall)"/>
  <path d="M 490 320 L 515 320" stroke="#8888aa" stroke-width="1" fill="none" marker-end="url(#arrowSmall)"/>

  <defs>
    <marker id="arrowSmall" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8888aa"/>
    </marker>
  </defs>

  <!-- Arrow to Vertex AI -->
  <path d="M 410 375 L 410 420" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 430 420 L 430 375" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="470" y="400" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="9">Gemini Live API</text>

  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Vertex AI Layer -->
  <rect x="120" y="430" width="560" height="120" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="680" y="445" fill="#f59e0b" font-family="Inter, sans-serif" font-size="9">Vertex AI</text>

  <rect x="200" y="450" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="300" y="480" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="14" font-weight="600">Gemini 3.1 Flash</text>
  <text x="300" y="500" text-anchor="middle" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="10">gemini-3.1-flash</text>
  <text x="300" y="520" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Native Audio + Vision</text>

  <rect x="430" y="450" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="480" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="14" font-weight="600">Cloud Firestore</text>
  <text x="520" y="500" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="10">Session State</text>
  <text x="520" y="520" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Intervention History</text>

  <!-- Legend -->
  <rect x="720" y="90" width="150" height="130" rx="8" fill="#1a1a2e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="795" y="115" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="11" font-weight="600">Data Flow</text>

  <line x1="735" y1="135" x2="770" y2="135" stroke="#6366f1" stroke-width="2"/>
  <text x="780" y="139" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Audio/Screen</text>

  <line x1="735" y1="160" x2="770" y2="160" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="164" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">ADK Bidi</text>

  <line x1="735" y1="185" x2="770" y2="185" stroke="#f59e0b" stroke-width="2"/>
  <text x="780" y="189" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Gemini Live</text>

  <!-- Hackathon badge -->
  <rect x="720" y="500" width="150" height="60" rx="8" fill="#1a1a2e" stroke="url(#accentGrad)" stroke-width="1"/>
  <text x="795" y="525" text-anchor="middle" fill="#f0f0f5" font-family="Inter, sans-serif" font-size="10" font-weight="600">Gemini Live Agent</text>
  <text x="795" y="545" text-anchor="middle" fill="#8888aa" font-family="Inter, sans-serif" font-size="9">Challenge 2026</text>
</svg>
